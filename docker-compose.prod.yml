# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:

# ─── Services ────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: prod_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
      TZ:                America/Santiago
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend ──────────────────────────────────────────────────────────────────
  # Imagen buildeada localmente y subida a Docker Hub.
  # Para actualizar: docker tag templatepern-backend TU_USUARIO/taller-backend:v1 && docker push
  backend:
    image: ${DOCKER_USERNAME}/taller-backend:${IMAGE_TAG:-latest}
    container_name: prod_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:       production
      TZ:             America/Santiago
      DB_HOST:        db
      DB_PORT:        5432
      DB_USER:        ${DB_USER}
      DB_PASSWORD:    ${DB_PASSWORD}
      DB_NAME:        ${DB_NAME}
      JWT_SECRET:     ${JWT_SECRET}
      PORT:           4000
      FRONTEND_URL:   https://mecanicaintegralaym.cl
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    networks:
      - app_network

  # ── Frontend (Nginx + HTTPS) ─────────────────────────────────────────────────
  # Imagen buildeada localmente y subida a Docker Hub.
  # Para actualizar: docker tag templatepern-frontend TU_USUARIO/taller-frontend:v1 && docker push
  frontend:
    image: ${DOCKER_USERNAME}/taller-frontend:${IMAGE_TAG:-latest}
    container_name: prod_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - app_network

  # ── Certbot (renovación de certificados) ─────────────────────────────────────
  # Uso: docker compose -f docker-compose.prod.yml --profile certbot run --rm certbot
  # Cron en el Droplet: 0 3 * * * docker compose -f ~/app-service/docker-compose.prod.yml --profile certbot run --rm certbot && docker exec prod_frontend nginx -s reload
  certbot:
    image: certbot/certbot:latest
    container_name: prod_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    command: renew --webroot --webroot-path=/var/www/certbot --quiet
    profiles:
      - certbot
